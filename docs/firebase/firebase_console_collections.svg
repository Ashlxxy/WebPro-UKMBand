  <text x="770" y="276" fill="#93C5FD" font-family="Consolas, monospace" font-size="17">"id"</text>
  <text x="830" y="276" fill="#CBD5E1" font-family="Consolas, monospace" font-size="17">: 5084312,</text>
  <text x="770" y="308" fill="#93C5FD" font-family="Consolas, monospace" font-size="17">"uid"</text>
  <text x="830" y="308" fill="#CBD5E1" font-family="Consolas, monospace" font-size="17">: "firebase-auth-uid",</text>
  <text x="770" y="340" fill="#93C5FD" font-family="Consolas, monospace" font-size="17">"name"</text>
  <text x="830" y="340" fill="#CBD5E1" font-family="Consolas, monospace" font-size="17">: "Ade Rainhard",</text>
  <text x="770" y="372" fill="#93C5FD" font-family="Consolas, monospace" font-size="17">"email"</text>
  <text x="830" y="372" fill="#CBD5E1" font-family="Consolas, monospace" font-size="17">: "user@example.com",</text>
  <text x="770" y="404" fill="#93C5FD" font-family="Consolas, monospace" font-size="17">"role"</text>
  <text x="830" y="404" fill="#CBD5E1" font-family="Consolas, monospace" font-size="17">: "user",</text>
  <text x="770" y="436" fill="#93C5FD" font-family="Consolas, monospace" font-size="17">"created_at"</text>
  <text x="890" y="436" fill="#CBD5E1" font-family="Consolas, monospace" font-size="17">: serverTimestamp,</text>
  <text x="770" y="468" fill="#93C5FD" font-family="Consolas, monospace" font-size="17">"updated_at"</text>
  <text x="890" y="468" fill="#CBD5E1" font-family="Consolas, monospace" font-size="17">: serverTimestamp</text>
  <text x="742" y="500" fill="#F8FAFC" font-family="Consolas, monospace" font-size="17">}</text>
  <text x="714" y="654" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="15">Ini representasi README. Data asli terlihat langsung di Firebase Console saat app dijalankan dengan USE_FIREBASE=true.</text>
